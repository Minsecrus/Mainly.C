name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Restore Clang source cache
        uses: actions/cache@v4
        with:
          path: .cache/clang-22
          key: ${{ runner.os }}-clang-22-${{ hashFiles('toolchain/clang-22/scripts/prepare-package.ps1', 'toolchain/clang-22/package/PROVENANCE.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Wasmer 7.2.0
        shell: pwsh
        run: |
          $env:WASMER_DIR = Join-Path $env:RUNNER_TEMP "wasmer"
          "WASMER_DIR=$env:WASMER_DIR" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          (Join-Path $env:WASMER_DIR "bin") | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $v = "v7.2.0"
          Invoke-WebRequest https://win.wasmer.io -UseBasicParsing | Invoke-Expression

      - name: Build local Clang 22 WebC
        shell: pwsh
        run: |
          $wasmerPath = Join-Path $env:WASMER_DIR "bin/wasmer.exe"
          pwsh -NoProfile -File toolchain/clang-22/scripts/build-package.ps1 -WasmerPath $wasmerPath

      - name: Build site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web-dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
